<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#151515">
<title>MK_APP 首页 · 体育</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="phone">

  <!-- ===== Sticky top stack (Figma 1417:94613) ===== -->
  <div class="top-stack">

    <!-- Status Bar + TopNavigation 91h (Figma 333:3180-3182) — 整图 topnav.png -->
    <div class="ts-topnav"></div>

    <!-- mk_banner 362×64 (Figma 1417:94616) — 透明 PNG -->
    <div class="ts-banner">
      <img src="assets/mk-banner.png" alt="原生体育APP 业内最高赔率 · www.mk.com">
    </div>

    <!-- venuetabs 390×50 (Figma 1417:94617) — 整图 venuetabs.png + 9 个透明交互层 -->
    <div class="ts-venue">
      <div class="v" data-id="hot"></div>
      <div class="v" data-id="live"></div>
      <div class="v sel" data-id="soccer"></div>
      <div class="v" data-id="casino"></div>
      <div class="v" data-id="slot"></div>
      <div class="v" data-id="esports"></div>
      <div class="v" data-id="lottery"></div>
      <div class="v" data-id="board"></div>
      <div class="v" data-id="ent"></div>
    </div>

  </div>

  <!-- ===== Sticky 区背景层（Figma 1526:125967） — 顶部半透明灰 → 透明渐变 + 1.5px backdrop blur ===== -->
  <div class="sticky-bg"></div>

  <!-- ===== sticky-headers 下方实色块 #F0F0F0，挡住 bet-card-img 透出 ===== -->
  <div class="sticky-gap"></div>

  <!-- ============ Filter region: sticky 钉在 top-stack 下方 ============ -->
  <div class="filter-region">

      <!-- ribbon 提到 sb-row 外，独立绝对定位，避免被 sb-row mask/overflow 裁切 -->
      <img class="ribbon-floating" src="assets/promo-ribbon.png" alt="高达 1.18% 无限返水">

      <!-- Row 1: sportsbook switcher (外层胶囊 .sb-row，内层滑动 .sb-row-inner) -->
      <div class="sb-row glass-pill">
        <div class="sb-row-inner fade-edge-x">
          <div class="sb-item active">
            <img class="logo" src="assets/mk-logo.png" alt="">
            <span class="label">MK体育</span>
          </div>
          <div class="sb-item">
            <img class="logo" src="assets/panda-logo.png" alt="">
            <span class="label">熊猫体育</span>
          </div>
          <div class="sb-item">
            <img class="logo" src="assets/im-logo.png" alt="">
            <span class="label">IM体育</span>
          </div>
          <div class="sb-item">
            <img class="logo" src="assets/saba-logo.png" alt="">
            <span class="label">沙巴体育</span>
          </div>
        </div>
      </div>

      <!-- Row 2: time tabs + balance -->
      <div class="time-bal-row">
        <div class="time-tabs glass-pill">
          <div class="tt active">今日</div>
          <div class="tt">滚球</div>
          <div class="tt">早盘</div>
          <div class="tt">串关</div>
          <div class="tt">冠军</div>
        </div>
        <div class="balance-pill glass-pill">
          <img src="assets/yen-coin.png" alt="">
          <span class="amt">35,102,652.00</span>
        </div>
      </div>

      <!-- Row 3: 球类筛选 + 联赛筛选 -->
      <div class="sport-card glass-pill">
        <div class="types fade-edge-x">
          <div class="mt">
            <span class="mt-icon" data-id="anchor"></span>
            <span class="name">主播</span>
            <span class="cnt">80</span>
          </div>
          <div class="mt">
            <span class="mt-icon" data-id="favorite"></span>
            <span class="name">收藏</span>
            <span class="cnt">206</span>
          </div>
          <div class="mt active">
            <span class="mt-icon" data-id="football"></span>
            <span class="name">足球</span>
            <span class="cnt">2850</span>
          </div>
          <div class="mt">
            <span class="mt-icon" data-id="basketball"></span>
            <span class="name">篮球</span>
            <span class="cnt">690</span>
          </div>
          <div class="mt">
            <span class="mt-icon" data-id="esports"></span>
            <span class="name">电竞</span>
            <span class="cnt">999</span>
          </div>
        </div>

        <div class="divider"></div>

        <div class="leagues-wrap">
          <div class="leagues fade-edge-x">
            <div class="lt"><span class="name">全部</span></div>
            <div class="lt">
              <span class="lt-icon" data-id="ucl"></span>
              <span class="name">欧冠</span>
            </div>
            <div class="lt">
              <span class="lt-icon" data-id="pl"></span>
              <span class="name">英超</span>
            </div>
            <div class="lt active">
              <span class="lt-icon" data-id="seriea"></span>
              <span class="name">意甲</span>
            </div>
            <div class="lt">
              <span class="lt-icon" data-id="laliga"></span>
              <span class="name">西甲</span>
            </div>
            <div class="lt">
              <span class="lt-icon" data-id="ligue1"></span>
              <span class="name">法甲</span>
            </div>
          </div>
          <button class="search-btn" type="button" aria-label="搜索">
            <img src="assets/search-icon.png" alt="">
          </button>
        </div>
      </div>
  </div>
  <!-- ============ Filter region END ============ -->

  <!-- ===== Scrollable content (1544:18062 Frame 2131331760) ===== -->
  <main class="scroll">
    <div class="bet-content">
      <!-- ===== 进行中 组 ===== -->
      <div class="bet-group">
        <img class="bet-substatus-img" src="assets/sticky-headers.png" alt="进行中">
        <section class="bet-section">
          <img class="bet-title-img" src="assets/title-1.png" alt="联赛标题 1">
          <img class="bet-card-img" src="assets/card-1.png" alt="赛事 1-1">
          <img class="bet-card-img" src="assets/card-2.png" alt="赛事 1-2">
        </section>
        <section class="bet-section">
          <img class="bet-title-img" src="assets/title-2.png" alt="联赛标题 2">
          <img class="bet-card-img" src="assets/card-3.png" alt="赛事 2-1">
          <img class="bet-card-img" src="assets/card-4.png" alt="赛事 2-2">
        </section>
        <section class="bet-section">
          <img class="bet-title-img" src="assets/title-3.png" alt="联赛标题 3">
          <img class="bet-card-img" src="assets/card-5.png" alt="赛事 3-1">
          <img class="bet-card-img" src="assets/card-6.png" alt="赛事 3-2">
        </section>
      </div>

      <!-- ===== 未开赛 组 ===== -->
      <div class="bet-group">
        <img class="bet-substatus-img" src="assets/sticky-headers-02.png" alt="未开赛">
        <section class="bet-section">
          <img class="bet-title-img" src="assets/title-4.png" alt="联赛标题 4">
          <img class="bet-card-img" src="assets/card-7.png" alt="赛事 4-1">
          <img class="bet-card-img" src="assets/card-8.png" alt="赛事 4-2">
        </section>
        <section class="bet-section">
          <img class="bet-title-img" src="assets/title-5.png" alt="联赛标题 5">
          <img class="bet-card-img" src="assets/card-9.png" alt="赛事 5-1">
          <img class="bet-card-img" src="assets/card-10.png" alt="赛事 5-2">
        </section>
        <section class="bet-section">
          <img class="bet-title-img" src="assets/title-6.png" alt="联赛标题 6">
          <img class="bet-card-img" src="assets/card-11.png" alt="赛事 6-1">
          <img class="bet-card-img" src="assets/card-12.png" alt="赛事 6-2">
        </section>
      </div>
    </div>
    <div class="footer-spacer"></div>
  </main>


  <!-- ============ Bottom floating sport tabbar: 切图 + 文字 ============ -->
  <div class="bottom-float">

<!-- Liquid Glass SVG filter (iOS 26 风格) -->
<svg class="liquid-glass-defs" aria-hidden="true">
  <filter id="liquid-glass" x="-30%" y="-30%" width="160%" height="160%">
    <feTurbulence type="fractalNoise" baseFrequency="0.008 0.014" numOctaves="3" seed="5" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="70" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
  <!-- 强折射：用于点击态边缘 ring -->
  <filter id="liquid-glass-strong" x="-60%" y="-60%" width="220%" height="220%">
    <feTurbulence type="fractalNoise" baseFrequency="0.005 0.010" numOctaves="3" seed="7" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="200" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
  <!-- 全椭圆扭曲：让点击态玻璃主体内 backdrop 大幅折射 -->
  <filter id="liquid-glass-soft" x="-40%" y="-40%" width="180%" height="180%">
    <feTurbulence type="fractalNoise" baseFrequency="0.010 0.016" numOctaves="3" seed="11" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="55" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
</svg>
